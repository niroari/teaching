<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אבולוציה – כך החיים משתנים</title>
  <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .hidden { display: none !important; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b27;
      --surface-2:  #1e2535;
      --border:     #2a3145;
      --text:       #e2e8f0;
      --text-muted: #8896aa;
      --accent:     #4ade80;
      --accent-dim: #166534;
    }

    body {
      font-family: 'Alef', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    /* ── HERO ─────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: radial-gradient(ellipse at 50% 40%, #0d2818 0%, var(--bg) 70%);
    }

    .hero-icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: float 3.5s ease-in-out infinite;
      display: block;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .hero h1 {
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.6rem;
      letter-spacing: -0.5px;
    }

    .hero h2 {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-muted);
      max-width: 480px;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .btn-start {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 0.9rem 2.8rem;
      font-size: 1.2rem;
      font-family: 'Alef', sans-serif;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 32px rgba(74, 222, 128, 0.25);
    }

    .btn-start:hover {
      transform: scale(1.06);
      box-shadow: 0 0 48px rgba(74, 222, 128, 0.45);
    }

    .hero-notice {
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.8rem;
      margin: 1.8rem 0 2rem;
      text-align: right;
      line-height: 1.9;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .hero-notice strong { color: var(--text); }

    /* ── STAGE VIEW ───────────────────────────────────── */
    .stage-view {
      display: none;
      min-height: 100vh;
      flex-direction: column;
    }

    .stage-view.active {
      display: flex;
    }

    /* ── PROGRESS BAR ─────────────────────────────────── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 1.5rem;
    }

    .progress-steps {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0;
    }

    .step-wrap {
      display: flex;
      align-items: center;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
    }

    .step:hover .step-dot {
      border-color: var(--accent);
      transform: scale(1.1);
    }

    .step-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      transition: all 0.3s;
    }

    .step.active .step-dot {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
      box-shadow: 0 0 16px rgba(74, 222, 128, 0.4);
    }

    .step.done .step-dot {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
      color: #d1fae5;
    }

    .step-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .step.active .step-label {
      color: var(--accent);
      font-weight: 700;
    }

    .step-line {
      width: 36px;
      height: 2px;
      background: var(--border);
      margin: 0 3px 18px 3px;
      transition: background 0.3s;
    }

    .step-line.done {
      background: var(--accent-dim);
    }

    /* ── STAGE CONTENT ────────────────────────────────── */
    .stage-content {
      flex: 1;
      padding: 3rem 2rem;
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── NAV BUTTONS ──────────────────────────────────── */
    .stage-nav {
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .btn-nav {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.65rem 1.8rem;
      font-size: 1rem;
      font-family: 'Alef', sans-serif;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-nav:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-nav:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .btn-nav.primary {
      background: var(--accent);
      color: #0d1117;
      border-color: var(--accent);
      font-weight: 700;
    }

    .btn-nav.primary:hover {
      transform: scale(1.04);
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
      color: #0d1117;
    }

    /* ── PLACEHOLDER STYLES ───────────────────────────── */
    .placeholder {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .placeholder h2 {
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .placeholder p {
      font-size: 1.05rem;
      line-height: 1.8;
    }

    /* ── STAGE 1: מבוא ────────────────────────────────── */
    .s1-pretitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      letter-spacing: 1px;
    }

    .s1-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.8rem;
      line-height: 1.3;
    }

    .s1-sub {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-bottom: 1.8rem;
    }

    .s1-votes {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .vote-btn {
      padding: 0.8rem 2rem;
      font-size: 1.05rem;
      font-family: 'Alef', sans-serif;
      border-radius: 50px;
      border: 2px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .vote-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.04);
    }

    .vote-btn.chosen {
      border-color: var(--accent) !important;
      color: var(--accent) !important;
      opacity: 1 !important;
    }

    .s1-reveal {
      margin-top: 3rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border);
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reveal-tag {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      margin-bottom: 0.8rem;
    }

    .s1-reveal h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.8rem;
      color: var(--text);
      line-height: 1.4;
    }

    .wow-facts {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .wow-card {
      flex: 1;
      min-width: 180px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }

    .wow-num {
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.6rem;
    }

    .wow-text {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .xray-pair {
      display: flex;
      gap: 1.5rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .xray-card {
      flex: 1;
      min-width: 220px;
      background: #000;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .xray-card img {
      width: 100%;
      display: block;
      max-height: 320px;
      object-fit: cover;
      object-position: top;
    }

    .xray-label {
      text-align: center;
      padding: 0.6rem;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
    }

    .sci-credit {
      margin-top: 0.3rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
    }

    .s1-explain {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
    }

    .s1-explain h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.9rem;
    }

    .s1-explain p {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 0.7rem;
    }

    .s1-explain p:last-child { margin-bottom: 0; }
    .s1-explain strong { color: var(--text); }

    .s1-teaser {
      text-align: center;
      padding: 1.2rem;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.7;
      font-style: italic;
    }

    .s1-feedback {
      margin-top: 1.2rem;
      padding: 0.9rem 1.4rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      animation: fadeInUp 0.3s ease;
    }

    .s1-feedback.correct {
      background: rgba(74, 222, 128, 0.12);
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .s1-feedback.wrong {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid #f87171;
      color: #f87171;
    }

    /* ── STAGE 2: ברירה טבעית ───────────────────────── */
    .s2-intro { margin-bottom: 2.5rem; }

    .s2-definition, .s3-definition {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 1.8rem;
      padding: 1.2rem 1.5rem;
      border-right: 3px solid var(--accent);
      background: var(--surface);
      border-radius: 0 10px 10px 0;
    }

    /* ── STAGE 3: תורשה ──────────────────────────────── */
    .s3-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .s3-lab {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-top: 2rem;
    }

    .s3-lab-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .parents-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .parent-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .parent-beetle { width: 54px; height: 72px; }
    .parent-beetle svg { width: 100%; height: 100%; display: block; }

    .parent-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 700;
    }

    .parents-plus {
      font-size: 2rem;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .s3-mix-btn { margin-bottom: 1.5rem; }

    .offspring-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      min-height: 80px;
      margin-bottom: 1rem;
    }

    .offspring-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      animation: fadeInUp 0.3s ease;
    }

    .offspring-beetle { width: 38px; height: 50px; }
    .offspring-beetle svg { width: 100%; height: 100%; display: block; }

    .mutation-badge {
      font-size: 0.65rem;
      background: #7c3aed;
      color: #fff;
      padding: 0.15rem 0.4rem;
      border-radius: 10px;
      font-weight: 700;
      white-space: nowrap;
    }

    .s3-mix-count {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .s3-insight {
      margin-top: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--accent-dim);
      border-radius: 12px;
      padding: 1.5rem;
      animation: fadeInUp 0.5s ease;
    }

    .s3-insight p {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 0.6rem;
    }

    .s3-insight p:last-child { margin-bottom: 0; }
    .s3-insight strong { color: var(--text); }

    /* ── STAGE 4: הזמן הגדול ─────────────────────────── */
    .s4-title {
      font-size: 1.8rem; font-weight: 700;
      color: var(--text); margin-bottom: 1.5rem;
    }

    .s4-scale-cards {
      display: flex; gap: 1rem;
      margin-bottom: 2.5rem; flex-wrap: wrap;
    }

    .s4-scale-card {
      flex: 1; min-width: 200px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; text-align: center;
    }

    .s4-scale-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }

    .s4-scale-card p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.7; }
    .s4-scale-card strong { color: var(--accent); }

    .s4-timeline {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.5rem; margin-bottom: 2rem;
    }

    .tl-intro {
      text-align: center; color: var(--text-muted);
      font-size: 0.95rem; margin-bottom: 1.5rem;
    }

    .tl-track { position: relative; margin-bottom: 1.5rem; padding: 0 17px; }

    .tl-line {
      position: absolute; top: 17px; left: 17px; right: 17px;
      height: 2px; background: var(--border); z-index: 0;
    }

    .tl-dots {
      display: flex; justify-content: space-between;
      position: relative; z-index: 1;
    }

    .tl-dot { display: flex; flex-direction: column; align-items: center; }

    .tl-dot span {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--surface-2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; transition: all 0.3s; cursor: pointer;
    }

    .tl-dot:hover span {
      border-color: var(--accent);
      transform: scale(1.15);
    }

    .tl-dot.active span {
      background: var(--accent); border-color: var(--accent);
      box-shadow: 0 0 14px rgba(74,222,128,0.5); transform: scale(1.25);
    }

    .tl-dot.done span { background: var(--accent-dim); border-color: var(--accent-dim); }

    .tl-event-card {
      background: var(--surface-2); border-radius: 12px;
      padding: 1.5rem; margin-bottom: 1.5rem;
      min-height: 130px; text-align: center;
    }

    .tl-ev-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

    .tl-ev-year {
      font-size: 0.82rem; color: var(--accent);
      font-weight: 700; margin-bottom: 0.3rem; letter-spacing: 0.3px;
    }

    .tl-ev-label {
      font-size: 1.3rem; font-weight: 700;
      color: var(--text); margin-bottom: 0.7rem;
    }

    .tl-ev-desc {
      font-size: 0.95rem; color: var(--text-muted);
      line-height: 1.7; margin-bottom: 0.8rem;
    }

    .tl-ev-wow {
      display: inline-block; background: var(--accent-dim);
      color: var(--accent); font-size: 0.82rem;
      font-weight: 700; padding: 0.3rem 0.8rem; border-radius: 20px;
    }

    .s4-end {
      background: var(--surface); border: 1px solid var(--accent-dim);
      border-radius: 12px; padding: 1.8rem;
      animation: fadeInUp 0.5s ease;
    }

    .s4-end h3 {
      font-size: 1.2rem; font-weight: 700;
      color: var(--accent); margin-bottom: 1.2rem;
    }

    .scale-bar-wrap { margin: 1.2rem 0; }

    .scale-bar-label {
      font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.3rem;
    }

    .scale-bar {
      height: 20px; background: var(--surface-2); border-radius: 4px;
      overflow: hidden; margin-bottom: 0.15rem;
    }

    .scale-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; min-width: 3px; }
    .scale-bar-fill.full { background: #2d3a2d; width: 100%; }

    .scale-bar-note {
      font-size: 0.72rem; color: var(--text-muted); font-style: italic;
    }

    .s4-end p {
      font-size: 1rem; color: var(--text-muted);
      line-height: 1.8; margin-top: 1rem;
    }

    .s4-end strong { color: var(--text); }

    .s2-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .concept-cards {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .concept-card {
      flex: 1;
      min-width: 160px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
    }

    .concept-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--accent);
      color: #0d1117;
      border-radius: 50%;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 0.7rem;
    }

    .concept-card h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .concept-card p {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .s2-cta {
      text-align: center;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .s2-game {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .game-round { font-size: 1rem; font-weight: 700; color: var(--text); }

    .game-timer {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 2.5rem;
      text-align: center;
      transition: color 0.3s;
    }

    .game-timer.urgent { color: #ef4444; }

    .game-instructions {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      text-align: center;
    }

    .game-field {
      position: relative;
      height: 260px;
      background: linear-gradient(160deg, #1a3a0a 0%, #0f2206 100%);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1rem;
      cursor: crosshair;
      border: 2px solid #2d5c14;
    }

    .beetle {
      position: absolute;
      width: 30px;
      height: 40px;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: transform 0.15s, opacity 0.25s;
      user-select: none;
    }

    .beetle svg { width: 100%; height: 100%; display: block; }

    .beetle:hover:not(.inactive) { transform: translate(-50%, -50%) scale(1.4); }

    .beetle.caught {
      transform: translate(-50%, -50%) scale(0) !important;
      opacity: 0;
      pointer-events: none;
    }

    .beetle.inactive { pointer-events: none; }

    .game-stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 1rem;
      justify-content: center;
    }

    .stat { font-size: 0.95rem; font-weight: 700; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }
    .green-text { color: #4ade80; }
    .red-text   { color: #f87171; }

    .round-history { margin-bottom: 1rem; }

    .hist-row {
      display: flex;
      align-items: center;

      s2State.timeLeft = 5;
      const timerEl = document.getElementById('gameTimer');
      timerEl.textContent = s2State.timeLeft;
      timerEl.classList.remove('urgent');
      s2State.timer = setInterval(() => {
        s2State.timeLeft--;
        timerEl.textContent = s2State.timeLeft;
        if (s2State.timeLeft <= 2) timerEl.classList.add('urgent');
        if (s2State.timeLeft <= 0) { clearInterval(s2State.timer); s2EndRound(); }
      }, 1000);
    }

    function s2CatchBeetle(b) {
      if (!s2State.active || b.classList.contains('caught')) return;
      b.classList.add('caught');
      if (b.dataset.color === 'green') s2State.greenCount = Math.max(0, s2State.greenCount - 1);
      else s2State.redCount = Math.max(0, s2State.redCount - 1);
      s2UpdateStats();
    }

    function s2EndRound() {
      s2State.active = false;
      document.querySelectorAll('.beetle').forEach(b => b.classList.add('inactive'));
      const survivors = { green: s2State.greenCount, red: s2State.redCount, round: s2State.round };
      s2State.history.push(survivors);
      s2UpdateHistory();
      const total = survivors.green + survivors.red;
      if (total > 0) {
        s2State.greenCount = survivors.green === 0 ? 0 : Math.round(survivors.green / total * 20);
        s2State.redCount   = survivors.red   === 0 ? 0 : 20 - s2State.greenCount;
      }
      s2UpdateStats();
      const caught = 20 - (survivors.green + survivors.red);
      const result = document.getElementById('roundResult');
      result.innerHTML =
        '<p class="result-caught">תפסתם ' + caught + ' חיפושיות!</p>' +
        '<p class="result-survive">שורדות: <span class="green-text">' + survivors.green + ' ירוקות</span> + <span class="red-text">' + survivors.red + ' אדומות</span></p>' +
        '<p class="result-next">הדור הבא: <span class="green-text">' + s2State.greenCount + ' ירוקות</span> + <span class="red-text">' + s2State.redCount + ' אדומות</span></p>';
      result.classList.remove('hidden');
      const btn = document.getElementById('btnGameStart');
      if (s2State.round >= s2State.maxRounds) {
        btn.textContent = 'ראו את התוצאה הסופית';
        btn.onclick = s2ShowOutcome;
      } else {
        s2State.round++;
        document.getElementById('roundNum').textContent = s2State.round;
        btn.textContent = 'סיבוב הבא';
        btn.onclick = () => { s2RenderField(); s2StartRound(); };
      }
      btn.style.display = 'block';
    }

    function s2UpdateStats() {
      const g = document.getElementById('greenCount');

      if (r) r.textContent = s2State.redCount;
    }

    function s2UpdateHistory() {
      const hist = document.getElementById('roundHistory');
      if (!hist) return;
      hist.innerHTML = s2State.history.map(h => {
        const gPct = Math.round(h.green / 20 * 100);
        return '<div class="hist-row">' +
          '<span class="hist-label">סיבוב ' + h.round + '</span>' +
          '<span class="hist-bar"><span class="hist-green" style="width:' + gPct + '%"></span><span class="hist-red"></span></span>' +
          '<span class="hist-nums"><span class="green-text">' + h.green + '</span>/<span class="red-text">' + h.red + '</span></span>' +
          '</div>';
      }).join('');
    }

      for (let i = 3; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
      }
      const shuffledAnswers = indices.map(i => q.answers[i]);
      const newCorrectIdx = indices.indexOf(q.correct);

      let answersHTML = '';
      shuffledAnswers.forEach((ans, i) => {
        answersHTML += '<button class="s7-answer-btn" onclick="s7Answer(this,' + i + ',' + newCorrectIdx + ')">' + ans + '</button>';
      });

      const isLast = s7Current === S7_QUESTIONS.length - 1;
      el.innerHTML =
        '<div class="s7-progress-wrap">' +
        '<div class="s7-progress-info">' +
        '<span>שאלה ' + (s7Current + 1) + ' מתוך ' + S7_QUESTIONS.length + '</span>' +
        '<span>' + s7Score + ' נכון עד כה</span>' +
        '</div>' +
        '<div class="s7-progress-bar"><div class="s7-progress-fill" style="width:' + pct + '%"></div></div>' +
        '</div>' +
        '<div class="s7-question-card">' +
        '<div class="s7-question-text">' + q.q + '</div>' +
        '<div class="s7-answers">' + answersHTML + '</div>' +
        '<div class="s7-explanation hidden" id="s7Explanation"></div>' +
        '</div>' +
        '<div class="s7-next-wrap hidden" id="s7NextWrap">' +
        '<button class="btn-game-start" onclick="s7Next()">' +
        (isLast ? 'לתוצאות &#x1F3C6;' : 'השאלה הבאה &#x2190;') +
        '</button>' +
        '</div>';
    }

    function s7Answer(btn, chosen, correct) {
      if (s7Answered) return;
      s7Answered = true;
      const allBtns = document.querySelectorAll('.s7-answer-btn');
      allBtns.forEach(b => b.disabled = true);
      if (chosen === correct) {
        btn.classList.add('correct');
        s7Score++;
      } else {
        btn.classList.add('wrong');
        allBtns[correct].classList.add('correct');
      }
      const q = S7_QUESTIONS[s7Current];
      const expEl = document.getElementById('s7Explanation');
      if (expEl) {
        expEl.innerHTML = (chosen === correct ? '✓ נכון! ' : '✗ לא בדיוק. ') + q.explanation;
        expEl.classList.remove('hidden');
      }
      const nextWrap = document.getElementById('s7NextWrap');
      if (nextWrap) nextWrap.classList.remove('hidden');
    }

    function s5Init() {
      s5Revealed = [false, false, false, false];
      for (let i = 0; i < 4; i++) {
        const card = document.getElementById('s5Card' + i);
        if (!card) continue;
        card.classList.remove('revealed');
        card.onclick = (function(idx) { return function() { s5Reveal(idx); }; })(i);
        const body = card.querySelector('.s5-card-body');
        if (body) body.remove();
        const hint = document.getElementById('s5Hint' + i);
        if (hint) hint.innerHTML = '&#x1F449; לחצו לגלות';
      }
      const sum = document.getElementById('s5Summary');
      if (sum) sum.classList.add('hidden');
    }

    function s5Reveal(i) {
      if (s5Revealed[i]) return;
      s5Revealed[i] = true;
      const card = document.getElementById('s5Card' + i);
      const data = S5_CARDS[i];
      card.classList.add('revealed');
      card.onclick = null;
      const hint = document.getElementById('s5Hint' + i);
      if (hint) hint.textContent = '';
      const body = document.createElement('div');
      body.className = 's5-card-body';
      if (data.img) {
        const img = document.createElement('img');
        img.src = data.img;
        img.alt = data.title;
        body.appendChild(img);
      }
      const p = document.createElement('p');
      p.innerHTML = data.text;
      body.appendChild(p);
      if (data.video) {
        const a = document.createElement('a');
        a.href = data.video;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 's5-video-link';
        a.textContent = '▶ צפו בסרטון להרחבה';
        body.appendChild(a);
      }
      card.appendChild(body);
      setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
      if (s5Revealed.every(Boolean)) {
        const sum = document.getElementById('s5Summary');
        if (sum) {
          sum.classList.remove('hidden');
          setTimeout(() => sum.scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
        }
      }
    }

          'אם כל ההיסטוריה = מגרש כדורגל — כל ההיסטוריה האנושית = <strong>5 סנטימטר אחרונים</strong>',
          'אבולוציה עובדת על מיליוני דורות — לא ניתן לראות אותה בחיי אדם'
        ]
      },
      {
        stage: 'שלב 5 — ראיות',
        title: 'מנין אנחנו יודעים?',
        image: 'ev-fossil.jpg',
        imageAlt: 'מאובן אמוניט בסלע',
        points: [
          '🦕 <strong>מאובנים</strong> — שומרים עקבות של מינים שחיו לפני מיליוני שנים',
          '🧬 <strong>DNA משותף</strong> — ככל שמינים קרובים יותר, ה-DNA שלהם דומה יותר',
          '🦴 <strong>מבנים שאריתיים</strong> — אפנדיקס, עצמות רגל בלוויתן, כנפיים בפינגווין',
          '👁 <strong>אבולוציה בזמן אמת</strong> — חיידקים מפתחים עמידות לאנטיביוטיקה תוך שנים'
        ]
      },
      {
        stage: 'שלב 6 — דוגמאות',
        title: 'אבולוציה בפעולה',
        image: 'ev-finches.jpg',
        imageAlt: 'ציפורי דרווין — השוואת מקורים',
        points: [
          '🐦 <strong>ציפורי דרווין</strong> — מין אחד, 14 מינים שונים; כל מקור מותאם למזון אחר',
          '🐕 <strong>כלבים</strong> — 400 גזעים שונים, כולם מגיעים מזאב אחד, תוך 15,000 שנה',
          '🐋 <strong>לוויתן</strong> — ממהלך ביבשה לשחייה בים; עצמות הרגל עדיין נמצאות בגוף',
          '🦠 <strong>חיידקים</strong> — מפתחים עמידות לאנטיביוטיקה — אנחנו רואים את זה קורה היום'
        ]
      },
      {
        stage: 'שלב 7 — בוחן',
        title: 'בוחן מסכם',
        icon: '🏆',
        points: [
          '6 שאלות רב-ברירה — כל החומר שלמדנו',
          'הגישו ב-Google Forms — תוצאות אצלכם בזמן אמת',
          'בסיום: סרטון סיכום ב-YouTube'
        ],
        note: 'הפנו את התלמידים לאתר ולחצו יחד על "בוחן מסכם"'
      }
    ];

    let presCurrent = 0;
    let presReveal = 0;

    function presItemCount(slide) {
      let n = slide.points.length;
      if (slide.summary)  n++;
      if (slide.question) n++;
      if (slide.activity) n++;
      if (slide.note) n++;
      return n;
    }

    function presOpen() {
      presCurrent = 0;
      presReveal = 0;
      document.getElementById('presOverlay').classList.remove('hidden');
      presRender();
      document.addEventListener('keydown', presKeyHandler);
    }

    function presExit() {
      document.getElementById('presOverlay').classList.add('hidden');
      document.removeEventListener('keydown', presKeyHandler);
    }

    function presKeyHandler(e) {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowDown')  presForward();
      if (e.key === 'ArrowRight' || e.key === 'ArrowUp')   presBack();
      if (e.key === 'Escape') presExit();
    }

    function presForward() {
      const slide = PRES_SLIDES[presCurrent];
      const total = presItemCount(slide);
      if (presReveal < total) {
        // reveal next item in place (no full re-render)
        const items = document.querySelectorAll('#presBody .pres-item');
        if (items[presReveal]) items[presReveal].classList.add('pres-visible');
        presReveal++;
        presUpdateNav();
      } else if (presCurrent < PRES_SLIDES.length - 1) {
        presCurrent++;
        presReveal = 0;
        presRender();
      } else {
        presExit();
      }
    }

    function presBack() {
      if (presCurrent === 0) return;
      presCurrent--;
      presReveal = presItemCount(PRES_SLIDES[presCurrent]); // show all on prev slide
      presRender();
    }

    function presUpdateNav() {
      const slide = PRES_SLIDES[presCurrent];
      const allShown = presReveal >= presItemCount(slide);
      const isLastSlide = presCurrent === PRES_SLIDES.length - 1;
      const nextBtn = document.getElementById('presBtnNext');
      nextBtn.textContent = (isLastSlide && allShown) ? 'סיום' : 'הבא ←';
      document.getElementById('presBtnPrev').disabled = presCurrent === 0;
    }

    function presRender() {
      const slide = PRES_SLIDES[presCurrent];
      const total = PRES_SLIDES.length;

      document.getElementById('presCounter').textContent = (presCurrent + 1) + ' / ' + total;

      const dots = document.getElementById('presDots');
      dots.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const d = document.createElement('div');
        d.className = 'pres-dot' + (i === presCurrent ? ' active' : '');
        (function(idx) { d.onclick = function() { presCurrent = idx; presReveal = 0; presRender(); }; })(i);
        dots.appendChild(d);
      }

      let html = '';
      if (slide.image) {
        html += '<div class="pres-img-wrap"><img src="' + slide.image + '" alt="' + slide.imageAlt + '" /></div>';
      } else if (slide.icon) {
        html += '<div class="pres-icon-wrap">' + slide.icon + '</div>';
      }

      html += '<div class="pres-content">';
      html += '<div class="pres-stage-label">' + slide.stage + '</div>';
      html += '<div class="pres-title">' + slide.title + '</div>';

      let idx = 0;
      html += '<ul class="pres-points">';
      slide.points.forEach(function(p) {
        const vis = idx < presReveal ? ' pres-visible' : '';
        html += '<li class="pres-item' + vis + '">' + p + '</li>';
        idx++;
      });
      html += '</ul>';

      if (slide.summary) {
        const vis = idx < presReveal ? ' pres-visible' : '';
        html += '<div class="pres-summary pres-item' + vis + '">' + slide.summary + '</div>';
        idx++;
      }
      if (slide.question) {
        const vis = idx < presReveal ? ' pres-visible' : '';
        html += '<div class="pres-question pres-item' + vis + '">💬 ' + slide.question + '</div>';
        idx++;
      }
      if (slide.activity) {
        const vis = idx < presReveal ? ' pres-visible' : '';
        html += '<div class="pres-activity pres-item' + vis + '"><div class="pres-activity-label">פעילות כיתתית</div><p>' + slide.activity + '</p></div>';
        idx++;
      }
      if (slide.note) {
        const vis = idx < presReveal ? ' pres-visible' : '';
        html += '<p class="pres-note pres-item' + vis + '">📌 ' + slide.note + '</p>';
        idx++;
      }

      html += '</div>';
      const bodyEl = document.getElementById('presBody');
      bodyEl.className = 'pres-body' + (slide.image ? ' pres-has-image' : '');
      bodyEl.innerHTML = html;
      presUpdateNav();
    }
  </script>

  <!-- ── PRESENTATION OVERLAY ── -->
  <div class="pres-overlay hidden" id="presOverlay">
    <div class="pres-topbar">
      <div class="pres-module-label">אבולוציה — מצגת למורה</div>
      <div class="pres-counter" id="presCounter">1 / 7</div>
      <button class="pres-exit-btn" onclick="presExit()">✕ יציאה</button>
    </div>
    <div class="pres-body" id="presBody"></div>
    <div class="pres-nav-bar">
      <button class="pres-nav-btn" id="presBtnPrev" onclick="presBack()">→ הקודם</button>
      <div class="pres-dots" id="presDots"></div>
      <button class="pres-nav-btn primary" id="presBtnNext" onclick="presForward()">הבא ←</button>
    </div>
  </div>

</body>
</html>
