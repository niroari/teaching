<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ויכוחים ואתגרים</title>
  <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b27;
      --surface-2:  #1e2535;
      --border:     #2a3145;
      --text:       #e2e8f0;
      --text-muted: #8896aa;
      --accent:     #a78bfa;
      --accent-dim: #2d1b69;
    }

    body {
      font-family: 'Alef', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    .hidden { display: none !important; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HERO ─────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      background: radial-gradient(ellipse at 50% 40%, #1a0d2e 0%, var(--bg) 70%);
    }

    .hero-icon {
      font-size: 5rem; margin-bottom: 1.5rem;
      animation: float 3.5s ease-in-out infinite; display: block;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .hero h1 { font-size: 3rem; font-weight: 700; color: var(--accent); margin-bottom: 0.6rem; }

    .hero h2 {
      font-size: 1.15rem; color: var(--text-muted); font-weight: 400;
      max-width: 480px; line-height: 1.7; margin-bottom: 2rem;
    }

    .hero-notice {
      max-width: 560px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 1.4rem 1.8rem; margin: 0 0 2rem;
      text-align: right; line-height: 1.9;
      font-size: 0.95rem; color: var(--text-muted);
    }

    .hero-notice strong { color: var(--text); }

    .btn-start {
      background: var(--accent); color: #0d1117;
      border: none; padding: 0.9rem 2.8rem;
      font-size: 1.2rem; font-family: 'Alef', sans-serif;
      font-weight: 700; border-radius: 50px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 32px rgba(167, 139, 250, 0.25);
    }

    .btn-start:hover {
      transform: scale(1.06);
      box-shadow: 0 0 48px rgba(167, 139, 250, 0.45);
    }

    /* ── STAGE VIEW ───────────────────────────────────── */
    .stage-view { display: none; }
    .stage-view.active { display: block; }

    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0.8rem 1rem;
    }

    .progress-steps {
      display: flex; align-items: center;
      justify-content: center; gap: 0;
      flex-wrap: nowrap; overflow-x: auto;
    }

    .step-wrap { display: flex; align-items: center; }

    .step {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.35rem; cursor: pointer;
    }

    .step:hover .step-dot { border-color: var(--accent); transform: scale(1.1); }

    .step-dot {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--surface-2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; color: var(--text-muted);
      transition: all 0.3s;
    }

    .step.active .step-dot {
      background: var(--accent); border-color: var(--accent); color: #0d1117;
      box-shadow: 0 0 16px rgba(167, 139, 250, 0.4);
    }

    .step.done .step-dot { background: var(--accent-dim); border-color: var(--accent-dim); color: #c4b5fd; }

    .step-label { font-size: 0.68rem; color: var(--text-muted); white-space: nowrap; }
    .step.active .step-label { color: var(--accent); font-weight: 700; }

    .step-line {
      width: 28px; height: 2px;
      background: var(--border); margin-bottom: 1.1rem; flex-shrink: 0;
    }

    .step-line.done { background: var(--accent-dim); }

    .stage-content {
      max-width: 680px; margin: 0 auto; padding: 2rem 1.2rem 1rem;
    }

    .stage-nav {
      max-width: 680px; margin: 0 auto;
      padding: 1rem 1.2rem 2.5rem;
      display: flex; justify-content: space-between; gap: 1rem;
    }

    .btn-nav {
      padding: 0.65rem 1.6rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-family: 'Alef', sans-serif;
      font-size: 0.95rem; cursor: pointer; transition: background 0.2s;
    }

    .btn-nav:hover:not(:disabled) { background: var(--surface-2); }
    .btn-nav:disabled { opacity: 0.35; cursor: default; }

    .btn-nav.primary {
      background: var(--accent); color: #0d1117;
      border-color: var(--accent); font-weight: 700;
    }

    .btn-nav.primary:hover { opacity: 0.88; }

    /* ── SHARED COMPONENTS ────────────────────────────── */
    .pretitle {
      font-size: 0.9rem; color: var(--accent);
      font-weight: 700; letter-spacing: 0.5px; margin-bottom: 0.5rem;
    }

    .stage-title {
      font-size: 2rem; font-weight: 700; color: var(--text);
      margin-bottom: 0.6rem; line-height: 1.3;
    }

    .stage-sub { font-size: 1rem; color: var(--text-muted); margin-bottom: 1.5rem; }

    .vote-btns { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1.5rem; }

    .vote-btn {
      width: 100%; background: var(--surface);
      border: 2px solid var(--border); border-radius: 10px;
      padding: 0.9rem 1.2rem; font-family: 'Alef', sans-serif;
      font-size: 1rem; color: var(--text); cursor: pointer;
      text-align: right; direction: rtl;
      transition: border-color 0.2s, background 0.2s;
    }

    .vote-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--surface-2); }
    .vote-btn.chosen { border-color: var(--accent); background: #1a0d2e; color: var(--accent); }

    .reveal-box { animation: fadeInUp 0.5s ease; }

    .reveal-tag {
      display: inline-block; background: var(--accent-dim); color: var(--accent);
      font-size: 0.78rem; font-weight: 700;
      padding: 0.3rem 0.8rem; border-radius: 20px; margin-bottom: 0.8rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 1rem; margin: 1.2rem 0;
    }

    .info-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.3rem;
    }

    .info-card-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

    .info-card-title {
      font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem;
    }

    .info-card-text {
      font-size: 0.9rem; color: var(--text-muted); line-height: 1.75;
    }

    .highlight-box {
      background: var(--accent-dim); border: 1px solid rgba(167,139,250,0.3);
      border-radius: 12px; padding: 1.3rem 1.4rem; margin: 1.2rem 0;
      font-size: 0.95rem; color: var(--text-muted); line-height: 1.8;
    }

    .highlight-box strong { color: var(--accent); }

    .info-block {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.4rem; margin-bottom: 1rem;
    }

    .info-block p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.8; margin-bottom: 0.7rem; }
    .info-block p:last-child { margin-bottom: 0; }
    .info-block strong { color: var(--text); }

    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.85rem; color: var(--text-muted);
      text-decoration: none; padding: 0.5rem 0; margin-bottom: 1rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    /* ── STAGE 2: תיאוריה מדעית ───────────────────────── */
    .compare-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1rem; margin: 1.2rem 0;
    }

    .compare-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.2rem; text-align: center;
    }

    .compare-card.bad  { border-color: #f87171; }
    .compare-card.good { border-color: var(--accent); }

    .compare-card-label {
      font-size: 0.78rem; font-weight: 700; margin-bottom: 0.6rem;
      padding: 0.25rem 0.7rem; border-radius: 20px; display: inline-block;
    }

    .compare-card.bad  .compare-card-label { background: #2d0f0f; color: #f87171; }
    .compare-card.good .compare-card-label { background: var(--accent-dim); color: var(--accent); }

    .compare-card-word {
      font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem;
    }

    .compare-card-text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }

    .theory-examples {
      display: flex; flex-wrap: wrap; gap: 0.6rem; margin: 1rem 0;
    }

    .theory-chip {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.4rem 0.9rem;
      font-size: 0.85rem; color: var(--text-muted);
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .theory-chip:hover { border-color: var(--accent); color: var(--text); }
    .theory-chip.active { border-color: var(--accent); color: var(--accent); }
    .theory-explain {
      display: none; width: 100%;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.75rem 1rem;
      font-size: 0.85rem; color: var(--text); line-height: 1.6;
      margin-top: 0.2rem;
    }
    .theory-explain.visible { display: block; }

    /* ── STAGE 3: דת ומדע ─────────────────────────────── */
    .opinion-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.3rem; margin-bottom: 0.9rem;
    }

    .opinion-card-header {
      display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.7rem;
    }

    .opinion-icon { font-size: 1.8rem; }

    .opinion-who { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); }

    .opinion-quote {
      font-size: 0.95rem; color: var(--text-muted); line-height: 1.8;
      border-right: 3px solid var(--accent-dim);
      padding-right: 0.9rem;
    }

    /* ── STAGE 4: שאלות פתוחות ────────────────────────── */
    .open-q {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.3rem; margin-bottom: 0.9rem;
    }

    .open-q-header {
      display: flex; align-items: flex-start; gap: 0.8rem; margin-bottom: 0.6rem;
    }

    .open-q-icon { font-size: 1.6rem; flex-shrink: 0; }

    .open-q-q { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.4; }

    .open-q-a { font-size: 0.9rem; color: var(--text-muted); line-height: 1.75; }

    .open-q-status {
      display: inline-block; margin-top: 0.6rem;
      font-size: 0.78rem; font-weight: 700;
      padding: 0.25rem 0.7rem; border-radius: 20px;
      background: var(--surface-2); color: var(--text-muted);
    }

    .open-q-status.research { background: var(--accent-dim); color: var(--accent); }

    /* ── STAGE 5: בוחן ────────────────────────────────── */
    .s5-pretitle { font-size: 0.9rem; color: var(--accent); font-weight: 700; margin-bottom: 0.4rem; }
    .s5-title { font-size: 2rem; font-weight: 700; color: var(--text); margin-bottom: 1.5rem; }

    .s5-progress-wrap { margin-bottom: 1.8rem; }
    .s5-progress-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .s5-progress-bar { height: 6px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
    .s5-progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }

    .s5-question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.8rem; margin-bottom: 1rem;
      animation: fadeInUp 0.35s ease;
    }
    .s5-question-text { font-size: 1.15rem; font-weight: 700; color: var(--text); line-height: 1.6; margin-bottom: 1.5rem; }
    .s5-answers { display: flex; flex-direction: column; gap: 0.7rem; }
    .s5-answer-btn {
      width: 100%; background: var(--surface-2);
      border: 2px solid var(--border); border-radius: 10px;
      padding: 0.9rem 1.2rem; font-family: 'Alef', sans-serif;
      font-size: 0.95rem; color: var(--text); cursor: pointer;
      text-align: right; direction: rtl;
      transition: border-color 0.2s, background 0.2s;
    }
    .s5-answer-btn:hover:not(:disabled) { border-color: var(--accent); }
    .s5-answer-btn.correct { border-color: #4ade80; background: #052e16; color: #4ade80; }
    .s5-answer-btn.wrong   { border-color: #f87171; background: #2d0f0f; color: #f87171; }
    .s5-answer-btn:disabled { cursor: default; }

    .s5-explanation { border-radius: 10px; padding: 0.8rem 1rem; margin-top: 1rem; font-size: 0.9rem; font-weight: 700; }
    .s5-explanation.ok { color: #4ade80; }
    .s5-explanation.no { color: #f87171; }

    .s5-next-wrap { text-align: center; margin-top: 1rem; animation: fadeInUp 0.3s ease; }
    .s5-next-btn {
      background: var(--accent); color: #0d1117;
      border: none; padding: 0.85rem 2.4rem;
      font-size: 1rem; font-family: 'Alef', sans-serif;
      font-weight: 700; border-radius: 50px; cursor: pointer;
      transition: opacity 0.2s;
    }
    .s5-next-btn:hover { opacity: 0.88; }

    .s5-score { text-align: center; animation: fadeInUp 0.5s ease; padding: 1rem 0; }
    .s5-score-emoji { font-size: 4rem; margin-bottom: 1rem; display: block; }
    .s5-score-num { font-size: 3.5rem; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 0.4rem; }
    .s5-score-label { font-size: 1rem; color: var(--text-muted); margin-bottom: 1.5rem; }

    .s5-name-form {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.4rem; text-align: right; margin-bottom: 1rem;
    }
    .s5-name-form label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.4rem; font-weight: 700; }
    .s5-name-form input {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.65rem 0.9rem;
      font-family: 'Alef', sans-serif; font-size: 1rem; color: var(--text);
      direction: rtl; margin-bottom: 0.9rem;
    }
    .s5-name-form input:focus { outline: none; border-color: var(--accent); }
    .s5-send {
      width: 100%; background: var(--accent); color: #0d1117;
      border: none; padding: 0.8rem; font-size: 1rem;
      font-family: 'Alef', sans-serif; font-weight: 700;
      border-radius: 10px; cursor: pointer; transition: opacity 0.2s;
    }
    .s5-send:hover { opacity: 0.88; }
    .s5-sent { background: #052e16; border: 1px solid #4ade80; border-radius: 10px; padding: 1rem; color: #4ade80; font-size: 0.95rem; text-align: center; }
  </style>
</head>
<body>

  <!-- ── HERO SCREEN ── -->
  <div class="hero" id="hero">
    <span class="hero-icon">⚖️</span>
    <h1>ויכוחים ואתגרים</h1>
    <h2>למה אנשים לא מסכימים עם תיאוריית האבולוציה — ומה המדע עונה</h2>
    <button class="btn-start" onclick="startLearning()">בואו נתחיל</button>
  </div>

  <!-- ── STAGE VIEW ── -->
  <div class="stage-view" id="stageView">
    <div class="topbar">
      <div class="progress-steps" id="progressSteps"></div>
    </div>
    <div class="stage-content" id="stageContent"></div>
    <div class="stage-nav">
      <button class="btn-nav" id="btnPrev" onclick="prevStage()">הקודם</button>
      <button class="btn-nav primary" id="btnNext" onclick="nextStage()">הבא ←</button>
    </div>
  </div>

  <script>
    const STAGES = [
      { label: 'מבוא' },
      { label: '"רק תיאוריה"' },
      { label: 'דת ומדע' },
      { label: 'שאלות פתוחות' },
      { label: 'בוחן' },
    ];

    const STAGE_HTML = [

      /* ── STAGE 1: מבוא ── */
      `<div>
  <a class="back-link" href="index.html">→ חזרה לדף הבית</a>
  <p class="pretitle">לפני שמתחילים —</p>
  <h2 class="stage-title">האם אתה מאמין בתיאוריית האבולוציה?</h2>
  <p class="stage-sub">בחרו את התשובה הקרובה ביותר לדעתכם:</p>

  <div class="vote-btns">
    <button class="vote-btn" onclick="s1Vote(this)">כן, בהחלט — המדע ברור 🔬</button>
    <button class="vote-btn" onclick="s1Vote(this)">לא בטוח — יש לי ספקות 🤔</button>
    <button class="vote-btn" onclick="s1Vote(this)">לא — אני לא מאמין/ה בזה ❌</button>
  </div>

  <div class="reveal-box hidden" id="s1Reveal">
    <span class="reveal-tag">נתון מעניין:</span>
    <h3 style="font-size:1.4rem;font-weight:700;color:var(--text);margin-bottom:1.2rem;line-height:1.4">
      97% מהמדענים בעולם מסכימים שתיאוריית האבולוציה נכונה
    </h3>

    <div class="info-block">
      <p>זה אחד הנתונים המוסכמים ביותר במדע — כמו ההסכמה שכדור הארץ עגול, שהגיל שלו 4.5 מיליארד שנה, ושהעישון גורם לסרטן.</p>
      <p>ובכל זאת, בקרב הציבור הרחב יש הרבה יותר ספקות. <strong>מאיפה הפער הזה?</strong></p>
      <p>בלומדה הזו נבדוק את הטענות הנפוצות נגד אבולוציה — ומה המדע עונה עליהן. נבדוק גם אילו שאלות המדע עדיין <em>לא</em> פתר.</p>
    </div>

    <div class="highlight-box">
      ⚠️ הלומדה הזו לא מנסה לשנות את האמונות שלכם.<br>
      המטרה היא להבין <strong>מה אומר המדע</strong>, ולהבדיל בין ויכוחים לגיטימיים לבין אי-הבנות.
    </div>
  </div>
</div>`,

      /* ── STAGE 2: "רק תיאוריה" ── */
      `<div>
  <p class="pretitle">שלב 2 —</p>
  <h2 class="stage-title">"זו רק תיאוריה"</h2>
  <p class="stage-sub">הטענה הנפוצה ביותר — ולמה היא מבוססת על אי-הבנה</p>

  <div class="compare-row">
    <div class="compare-card bad">
      <div class="compare-card-label">בשפה יומיומית</div>
      <div class="compare-card-word">תיאוריה</div>
      <p class="compare-card-text">השערה, ניחוש, רעיון שעדיין לא הוכח. "יש לי תיאוריה לגבי מה קרה..."</p>
    </div>
    <div class="compare-card good">
      <div class="compare-card-label">במדע</div>
      <div class="compare-card-word">תיאוריה</div>
      <p class="compare-card-text">הסבר מקיף המגובה בראיות נרחבות, עמד במבחן של מחקרים רבים, ומוסכם על הקהילה המדעית.</p>
    </div>
  </div>

  <div class="info-block">
    <p>כשמדענים קוראים למשהו "תיאוריה" — זו למעשה המחמאה המדעית הגדולה ביותר. זה אומר: <strong>הסבר זה נבדק שוב ושוב ועמד בכל המבחנים.</strong></p>
    <p>בשפת המדע, "עובדה" פירושה תצפית בודדת. "תיאוריה" מסבירה מה גורם לתצפיות האלה — ולכן היא גבוהה יותר בהיררכיה המדעית.</p>
  </div>

  <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:0.6rem;font-weight:700">עוד "תיאוריות" מדעיות — שאף אחד לא מפקפק בהן:</p>
  <div class="theory-examples">
    <span class="theory-chip" onclick="toggleTheory('gravity')">🍎 תיאוריית הגרביטציה</span>
    <span class="theory-chip" onclick="toggleTheory('germ')">🦠 תיאוריית הנבט (חיידקים גורמים למחלות)</span>

      `<div class="s5" id="s5Root">

    /* ── ENGINE ── */
    function buildProgressBar() {
